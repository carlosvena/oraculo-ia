name: oraculo_ia
description: Mentor diario para aprender Inteligencia Artificial en espanol.
publish_to: none
version: 2.12.0+23

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  flutter_tts: ^4.2.5
  pdf: ^3.11.3
  path_provider: ^2.1.5
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  shared_preferences_platform_interface: ^2.4.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - knowledge/
    - knowledge/missions/
